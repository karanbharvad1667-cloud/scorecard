<!DOCTYPE html>
<html>
<head>
    <title>Scoreboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="scoreboard">
        <div class="team">
            <h1>HOME</h1>
            <div id="home-score" class="score">0</div>

            <div class="buttons">
                <button onclick="homeAdd(1)">+1</button>
                <button onclick="homeAdd(2)">+2</button>
                <button onclick="homeAdd(3)">+3</button>
            </div>
        </div>

        <div class="team">
            <h1>AWAY</h1>
            <div id="guest-score" class="score">0</div>

            <div class="buttons">
                <button onclick="guestAdd(1)">+1</button>
                <button onclick="guestAdd(2)">+2</button>
                <button onclick="guestAdd(3)">+3</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
